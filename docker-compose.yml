services:
  chat-multi-stream:
    image: ghcr.io/andarilhoz/chat-multi-stream:latest
    container_name: chat-multi-stream
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - TWITCH_CHANNEL=
      - YOUTUBE_API_KEY=
      - YOUTUBE_CHANNEL=
      - KICK_CHANNEL=
      - ADMIN_USER=
      - ADMIN_PASSWORD=
