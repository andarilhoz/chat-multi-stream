<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Overlay (OBS)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #18181b;
      overflow: hidden;
      height: 100vh;
    }

    #chat_container {
      width: 100%;
      height: 100vh;
      padding: 8px 6px;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      font-family: 'Segoe UI', Inter, Arial, sans-serif;
      font-size: 14px;
      word-break: break-word;
    }

    #chat_container::-webkit-scrollbar { width: 4px; }
    #chat_container::-webkit-scrollbar-track { background: transparent; }
    #chat_container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ── Message row ── */
    .chat_line {
      padding: 5px 8px 5px 10px;
      margin-bottom: 3px;
      border-radius: 4px;
      background: rgba(255,255,255,0.04);
      border-left: 3px solid transparent;
      animation: fadeIn 0.2s ease-out;
    }

    /* ── Header: username + timestamp ── */
    .user_info {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 2px;
    }

    .nick {
      font-weight: 700;
      font-size: 13px;
      line-height: 1.3;
    }

    .colon { display: none; }

    .timestamp {
      font-size: 10px;
      font-family: monospace;
      color: rgba(255,255,255,0.3);
      font-weight: 400;
    }

    /* ── Message body ── */
    .message {
      display: block;
      font-size: 14px;
      font-weight: 400;
      color: #efeff1;
      line-height: 1.45;
    }

    /* ── Badges ── */
    .chat_badge {
      display: inline-block;
      font-size: 9px;
      font-family: monospace;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 1px 4px;
      border-radius: 3px;
      border: 1px solid transparent;
      vertical-align: middle;
      line-height: 1.4;
      margin-right: 3px;
      opacity: 0.85;
    }

    /* ── Emotes ── */
    .emote {
      height: 22px;
      width: auto;
      vertical-align: middle;
      display: inline-block;
    }

    .yt-emote-badge {
      font-size: 0.8em;
      opacity: 0.6;
      font-style: italic;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="chat_container"></div>

  <script>
    // ── Configuration via URL query parameters ────────────────────────────
    // fade   = seconds before a message fades  (default: 20)
    // size   = font size in px                 (default: 20)
    // max    = max visible messages            (default: 100)
    const p          = new URLSearchParams(location.search);
    const MAX_MSGS   = parseInt(p.get('max')  || p.get('max_messages') || '100', 10);
    const FONT_SIZE  = parseInt(p.get('size') || p.get('font_size')    || '20',  10);
    const FADE_SECS  = parseFloat(p.get('fade') || '0');   // seconds, 0 = no fade (default for /obs)

    // Platform → username colour, matching jChat Twitch palette feel
    const PLATFORM_COLORS = {
      twitch:  '#9147ff',
      youtube: '#ff4444',
      kick:    '#53fc18',
    };

    // Apply font size override.
    document.getElementById('chat_container').style.fontSize = FONT_SIZE + 'px';

    // ── XSS-safe helpers ─────────────────────────────────────────────────
    function escapeHTML(str) {
      const el = document.createElement('div');
      el.textContent = str;
      return el.innerHTML;
    }
    function escapeAttr(str) {
      return String(str).replace(/[&"<>]/g, c => ({'&':'&amp;','"':'&quot;','<':'&lt;','>':'&gt;'}[c]));
    }
    function emoteImg(url, name) {
      return `<img src="${escapeAttr(url)}" alt="${escapeHTML(name)}" class="emote" loading="lazy">`;
    }
    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    // Badge display config: badge key → { label, color }
    const BADGE_CONFIG = {
      broadcaster: { label: 'HOST', color: '#f59e0b' },
      owner:       { label: 'HOST', color: '#f59e0b' },
      moderator:   { label: 'MOD',  color: '#22c55e' },
      mod:         { label: 'MOD',  color: '#22c55e' },
      vip:         { label: 'VIP',  color: '#ec4899' },
      subscriber:  { label: 'SUB',  color: '#a855f7' },
      member:      { label: 'MEM',  color: '#a855f7' },
      staff:       { label: 'STAFF', color: '#3b82f6' },
    };

    function renderBadges(badges) {
      if (!badges || !badges.length) return '';
      return badges.map(b => {
        const key = b.toLowerCase();
        const cfg = BADGE_CONFIG[key] || { label: b.toUpperCase().slice(0, 4), color: '#6b7280' };
        const c = cfg.color;
        return `<span class="chat_badge" style="background:${escapeAttr(c)}22;color:${escapeAttr(c)};border-color:${escapeAttr(c)}55">${escapeHTML(cfg.label)}</span>`;
      }).join('');
    }

    // ── Third-party emote registries ──────────────────────────────────────
    // Keyed by emote name → CDN URL.
    const globalEmotes  = {};           // BTTV / FFZ / 7TV globals
    const channelEmotes = {};           // channelId → { name → url }
    const loadingChannels = new Set();  // channel IDs currently being fetched

    // ── YouTube emoji shortcode map ───────────────────────────────────────
    // Populated from the YouTube emoji catalog (gstatic CDN) at startup.
    // Keys are shortcodes without the surrounding colons, e.g. "face-red-droopy-eyes".
    const ytEmotes = {};

    async function loadYouTubeEmotes() {
      // YouTube's public emoji catalog. Each entry looks like:
      // { "id": "00ae", "sc": [":shortcode:", ...], ... }
      // Images are served at: https://www.gstatic.com/youtube/img/emojis/emoji_<id>_48.png
      const catalogURL = 'https://www.gstatic.com/youtube/img/emojis/v2/emoji_list.json';
      try {
        const resp = await fetch(catalogURL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status} from ${catalogURL}`);
        const list = await resp.json();
        if (!Array.isArray(list)) {
          console.warn('[overlay] YouTube emoji catalog: unexpected format (not an array), got:', typeof list, list);
        } else {
          for (const entry of list) {
            if (!entry.id || !Array.isArray(entry.sc)) continue;
            const url = `https://www.gstatic.com/youtube/img/emojis/emoji_${entry.id}_48.png`;
            for (const sc of entry.sc) {
              const name = sc.replace(/^:|:$/g, '');
              if (name) ytEmotes[name] = url;
            }
          }
          const keys = Object.keys(ytEmotes);
          console.log('[overlay] YouTube emotes loaded:', keys.length, '— sample keys:', keys.slice(0, 5));
        }
      } catch (err) {
        console.warn('[overlay] YouTube emoji catalog failed, will use fallback only:', err);
      }
    }

    async function loadGlobalEmotes() {
      // BTTV global
      try {
        const list = await fetch('https://api.betterttv.net/3/cached/emotes/global').then(r => r.json());
        for (const e of list) {
          globalEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/2x`;
        }
      } catch (err) { console.warn('[overlay] BTTV global failed', err); }

      // FFZ global
      try {
        const data = await fetch('https://api.frankerfacez.com/v1/set/global').then(r => r.json());
        for (const setId of (data.default_sets || [])) {
          const set = data.sets?.[String(setId)];
          if (!set) continue;
          for (const em of set.emoticons) {
            const raw = em.urls?.['2'] || em.urls?.['1'];
            if (raw) globalEmotes[em.name] = raw.startsWith('//') ? 'https:' + raw : raw;
          }
        }
      } catch (err) { console.warn('[overlay] FFZ global failed', err); }

      // 7TV global
      try {
        const data = await fetch('https://7tv.io/v3/emote-sets/global').then(r => r.json());
        for (const e of (data.emotes || [])) {
          const host = e.data?.host;
          if (!host) continue;
          const file = host.files?.find(f => f.name === '2x.webp') || host.files?.[0];
          if (file) globalEmotes[e.name] = `https:${host.url}/${file.name}`;
        }
      } catch (err) { console.warn('[overlay] 7TV global failed', err); }

      console.log('[overlay] global emotes loaded:', Object.keys(globalEmotes).length);
    }

    // Lazily load channel-specific emotes the first time we see a channel_id.
    async function loadChannelEmotes(channelId, channelName) {
      if (channelEmotes[channelId] !== undefined || loadingChannels.has(channelId)) return;
      loadingChannels.add(channelId);
      const map = {};

      // BTTV channel
      try {
        const data = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${encodeURIComponent(channelId)}`).then(r => r.json());
        for (const e of [...(data.channelEmotes || []), ...(data.sharedEmotes || [])]) {
          map[e.code] = `https://cdn.betterttv.net/emote/${e.id}/2x`;
        }
      } catch (err) { console.warn('[overlay] BTTV channel failed', err); }

      // FFZ channel (accepts channel name directly)
      try {
        const data = await fetch(`https://api.frankerfacez.com/v1/room/${encodeURIComponent(channelName)}`).then(r => r.json());
        const set = data.sets?.[String(data.room?.set)];
        if (set) {
          for (const em of set.emoticons) {
            const raw = em.urls?.['2'] || em.urls?.['1'];
            if (raw) map[em.name] = raw.startsWith('//') ? 'https:' + raw : raw;
          }
        }
      } catch (err) { console.warn('[overlay] FFZ channel failed', err); }

      // 7TV channel
      try {
        const data = await fetch(`https://7tv.io/v3/users/twitch/${encodeURIComponent(channelId)}`).then(r => r.json());
        for (const e of (data.emote_set?.emotes || [])) {
          const host = e.data?.host;
          if (!host) continue;
          const file = host.files?.find(f => f.name === '2x.webp') || host.files?.[0];
          if (file) map[e.name] = `https:${host.url}/${file.name}`;
        }
      } catch (err) { console.warn('[overlay] 7TV channel failed', err); }

      channelEmotes[channelId] = map;
      console.log(`[overlay] channel ${channelName} (${channelId}) emotes loaded:`, Object.keys(map).length);
    }

    // ── Message HTML renderer ─────────────────────────────────────────────
    // Builds safe HTML for a message, replacing known emote names with <img>.
    function renderMessageHTML(msg) {
      // Merge: YouTube catalog → global third-party → channel-specific → backend-provided (highest priority)
      const emoteMap = Object.assign({}, ytEmotes, globalEmotes);
      if (msg.channel_id && channelEmotes[msg.channel_id]) {
        Object.assign(emoteMap, channelEmotes[msg.channel_id]);
      }
      if (Array.isArray(msg.emotes)) {
        for (const e of msg.emotes) emoteMap[e.name] = e.url;
      }

      function renderWord(word) {
        return emoteMap[word] ? emoteImg(emoteMap[word], word) : escapeHTML(word);
      }

      if (msg.platform === 'youtube') {
        // YouTube encodes custom emoji as :shortcode: in the message text.
        // Standard Unicode emoji (🎉, 😂) are returned as-is and rendered natively.
        return msg.message.split(/(:[-\w]+:)/).map(part => {
          const m = part.match(/^:([-\w]+):$/);
          if (m) {
            const name = m[1];
            if (emoteMap[name]) return emoteImg(emoteMap[name], name);
            // Unrecognised YouTube shortcode: show as a muted inline badge.
            return `<span class="yt-emote-badge">${escapeHTML(part)}</span>`;
          }
          return escapeHTML(part);
        }).join('');
      }

      if (msg.platform === 'kick') {
        // Kick embeds emotes as [emote:NUMERIC_ID:name] inside the message text.
        // Split on those tokens, render each separately.
        const parts = msg.message.split(/(\[emote:\d+:[^\]]*\])/);
        return parts.map(part => {
          const m = part.match(/^\[emote:(\d+):([^\]]*)\]$/);
          if (m) {
            const [, id, name] = m;
            return emoteImg(`https://files.kick.com/emotes/${id}/fullsize`, name || id);
          }
          // Plain text portion — still do word-based emote matching.
          return part.split(' ').map(renderWord).join(' ');
        }).join('');
      }

      // All other platforms: word-by-word matching.
      return msg.message.split(' ').map(renderWord).join(' ');
    }

    // ── Render a message ─────────────────────────────────────────────────
    function addMessage(msg) {
      // Kick and Twitch channel emotes are loaded lazily on first message.
      if (msg.channel_id) {
        loadChannelEmotes(msg.channel_id, msg.channel);
      }

      const chat  = document.getElementById('chat_container');
      const color = PLATFORM_COLORS[msg.platform] || '#ffffff';

      const line = document.createElement('div');
      line.className = 'chat_line';
      line.style.borderLeftColor = color;
      // renderMessageHTML produces safe HTML; username/color go through escape helpers.
      const timeStr = formatTime(msg.timestamp);
      line.innerHTML =
        `<div class="user_info">` +
          renderBadges(msg.badges) +
          `<span class="nick" style="color:${escapeAttr(color)}">${escapeHTML(msg.username)}</span>` +
          (timeStr ? `<span class="timestamp">${escapeHTML(timeStr)}</span>` : '') +
        `</div>` +
        `<span class="message">${renderMessageHTML(msg)}</span>`;

      chat.appendChild(line);
      chat.scrollTop = chat.scrollHeight;

      // Trim oldest messages when the cap is exceeded.
      while (chat.children.length > MAX_MSGS) {
        chat.removeChild(chat.firstChild);
      }

      // Auto-fade and remove after FADE_SECS seconds (0 = never).
      if (FADE_SECS > 0) {
        setTimeout(() => {
          line.style.transition = 'opacity 0.4s ease-out';
          line.style.opacity = '0';
          setTimeout(() => line.remove(), 400);
        }, FADE_SECS * 1000);
      }
    }

    // ── WebSocket connection with auto-reconnect ─────────────────────────
    function connect() {
      const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
      const wsURL = `${wsProto}://${location.host}/ws`;
      const ws = new WebSocket(wsURL);

      ws.onopen    = () => console.log('[overlay] connected to', wsURL);
      ws.onmessage = (e) => { try { addMessage(JSON.parse(e.data)); } catch (_) {} };
      ws.onerror   = (e) => console.error('[overlay] WebSocket error', e);
      ws.onclose   = () => {
        console.log('[overlay] connection lost — reconnecting in 3s');
        setTimeout(connect, 3000);
      };
    }

    // Load all emote catalogs in the background, then open the WebSocket.
    Promise.all([loadYouTubeEmotes(), loadGlobalEmotes()]).finally(connect);
  </script>
</body>
</html>
